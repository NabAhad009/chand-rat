<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nabiha 🌙</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    min-height:100vh;
    background: radial-gradient(circle at bottom, #020111 0%, #000 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    overflow:hidden;
    padding:20px;
}

/* Stars */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:1;}
}

/* Moon */
.moon{
    position:absolute;
    top:6%;
    right:8%;
    width:90px;
    height:90px;
    border-radius:50%;
    background: radial-gradient(circle,#fff,#ddd);
    box-shadow:0 0 40px rgba(255,255,255,0.9);
    animation:float 6s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

/* Card */
.card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.06);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 0 30px rgba(255,255,255,0.08);
    animation:fadeIn 2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-size:24px;
    color:#ffd369;
}

.name{
    color:#ff4d6d;
    font-weight:bold;
    font-size:20px;
}

p{
    margin:15px 0;
    font-size:15px;
    line-height:1.6;
}

/* Button */
button{
    margin-top:10px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#ff4d6d,#ffd369);
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

/* Message */
.message{
    margin-top:20px;
    opacity:0;
    transition:0.8s;
    font-size:16px;
    line-height:1.7;
    white-space:pre-line;
}

.show{
    opacity:1;
}

/* Hearts */
.heart{
    position:absolute;
    font-size:18px;
    animation:floatUp 3s linear forwards;
}

@keyframes floatUp{
    0%{transform:translateY(0); opacity:1;}
    100%{transform:translateY(-200px); opacity:0;}
}

/* Mobile tweaks */
@media(max-width:480px){
    h1{font-size:20px;}
    .name{font-size:18px;}
    p{font-size:14px;}
    .moon{
        width:70px;
        height:70px;
        top:4%;
        right:5%;
    }
}
</style>
</head>
<body>

<div class="moon"></div>

<div class="card">
    <h1>🌙 Chand Raat Mubarak</h1>

    <p>
        Everyone is looking at the moon tonight…<br>
        searching for something beautiful in the sky ✨
    </p>

    <p class="name">But my moon is you, Nabiha 💖</p>

    <button onclick="startLove()">Reveal Now 💌</button>

    <div class="message" id="msg"></div>
</div>

<script>

/* Stars */
for(let i=0;i<100;i++){
    let star=document.createElement('div');
    star.className='star';
    star.style.top=Math.random()*window.innerHeight+'px';
    star.style.left=Math.random()*window.innerWidth+'px';
    star.style.animationDuration=(Math.random()*2+1)+'s';
    document.body.appendChild(star);
}

/* Message */
const text = `Happy Chand Raat, my Chand Nabiha 🌙💖

Tonight, everyone is looking up at the moon...
but I don't need to look at the sky...

because my moon is right here in my life ❤️

You are not just as beautiful as the moon...
you are the light that makes all my nights brighter ✨

No matter how far or near we are,
you will always be my Chand 🌙

— Yours, Ahad 💌`;

let i=0;

function startLove(){
    let msg=document.getElementById("msg");
    msg.classList.add("show");

    if(msg.innerHTML===""){
        let interval=setInterval(()=>{
            msg.innerHTML += text.charAt(i);
            i++;
            if(i>=text.length) clearInterval(interval);
        },35);
    }
}

/* Hearts */
document.addEventListener("click", function(e){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=e.clientX+"px";
    heart.style.top=e.clientY+"px";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),3000);
});

</script>

</body>
</html>
